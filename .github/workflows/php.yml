name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer

      - name: Validate and install Composer dependencies
        run: |
          for dir in $(find . -name composer.json -not -path "*/vendor/*" -exec dirname {} \;); do
            echo "Processing $dir"

            cd "$dir"

            composer validate --strict
            composer install --prefer-dist --no-progress --no-interaction

            cd - > /dev/null
          done